[pytest]
# Run only the integration suite from this config.
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest-order enforces dependency ordering via @pytest.mark.order(N).
markers =
    order: dependency execution order for the integration suite

addopts =
    -ra
    -v
    --tb=short
    --color=yes

# Live API calls need room; individual tests can override.
# (pytest-timeout is optional; uncomment if installed)
# timeout = 120
